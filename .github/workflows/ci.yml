name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Ruff check
        run: cd backend && ruff check .
      - name: Ruff format check
        run: cd backend && ruff format --check .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: docuagent
          POSTGRES_PASSWORD: docuagent
          POSTGRES_DB: docuagent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://docuagent:docuagent@localhost:5432/docuagent_test
          CHROMA_HOST: localhost
          CHROMA_PORT: 8000
          JWT_SECRET_KEY: test-secret
          LLM_PROVIDER: claude
          ANTHROPIC_API_KEY: test-key
        run: cd backend && pytest -v --tb=short

  frontend-lint-test:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Run tests
        run: cd frontend && npm test -- --run
      - name: Build
        run: cd frontend && npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t docuagent-backend ./backend
      - name: Build frontend image
        run: docker build -t docuagent-frontend ./frontend
